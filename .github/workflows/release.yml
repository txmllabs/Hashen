# Build sdist and wheel, generate SHA256SUMS, upload artifacts.
# Trigger manually or from tag; upload steps can be extended for PyPI/GitHub Releases.
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build deps
        run: python -m pip install -U pip build

      - name: Build sdist and wheel
        run: python -m build --outdir dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
