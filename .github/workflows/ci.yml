name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project and dev deps
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Pytest
        run: pytest -q

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: pip-audit
        run: pip-audit --strict --desc

      - name: CycloneDX SBOM
        run: |
          mkdir -p sbom
          cyclonedx-py environment --pyproject pyproject.toml --outfile sbom/bom.json --output-format JSON

      - name: Evidence-bundle smoke test
        run: |
          echo -n "hashen-ci" > sample.bin
          python tools/run_evidence_bundle.py sample.bin ci-run --output-dir bundle_ci
          python tools/verify_bundle.py bundle_ci

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/
          retention-days: 7
